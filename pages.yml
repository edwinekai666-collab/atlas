name: Deploy Atlas to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Configure Atlas cloud client
        env:
          SUPABASE_URL: ${{ vars.ATLAS_SUPABASE_URL }}
          SUPABASE_KEY: ${{ vars.ATLAS_SUPABASE_KEY }}
        run: |
          if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_KEY" ]; then
            printf "window.ATLAS_SUPABASE_CONFIG = {\\n  url: '%s',\\n  key: '%s'\\n};\\n" "$SUPABASE_URL" "$SUPABASE_KEY" > supabase-config.js
          fi
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
